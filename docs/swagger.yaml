                            type: object
                            properties:
                              id:
                                type: string
                                example: 65f6f18e79ad6f8a3fca53a1
                              title:
                                type: string
                                example: 'Clean Architecture'
                              authors:
                                type: array
                                items:
                                  type: string
                                  example: 65f6f18e79ad6f8a3fca53ff
                              publication_year:
                                type: integer
                                example: 2017
                              description:
                                type: string
                                example: 'Practicas de arquitectura para software mantenible.'
                          -
                            type: object
                            properties:
                              authors_expanded:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    full_name:
                                      type: string
                                    birth_date:
                                      type: string
                                      format: date
        422:
          description: 'Error de validacion'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: VALIDATION_ERROR
                      message:
                        type: string
                        example: 'Title cannot be blank.'
                      details:
                        type: object
                        additionalProperties:
                          type: array
                          items:
                            type: string
        400:
          description: 'Solicitud invalida'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: UNAUTHORIZED
                      message:
                        type: string
                        example: 'Invalid or expired token.'
        404:
          description: 'Libro no encontrado'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: UNAUTHORIZED
                      message:
                        type: string
                        example: 'Invalid or expired token.'
    delete:
      tags:
        - Books
      summary: 'Eliminar libro'
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
            type: string
            pattern: '^[a-fA-F0-9]{24}$'
          description: 'MongoDB ObjectId.'
      responses:
        200:
          description: 'Libro eliminado'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      message:
                        type: string
                        example: 'Book deleted successfully.'
        400:
          description: 'ID invalido'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: UNAUTHORIZED
                      message:
                        type: string
                        example: 'Invalid or expired token.'
        404:
          description: 'Libro no encontrado'
          content:
            application/json:
              schema:
                type: object
                properties:
