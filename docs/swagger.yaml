openapi: 3.0.3
info:
  title: 'Library API'
  version: 2.0.0
  description: 'API REST para gestion de biblioteca virtual (Yii2 + MongoDB).'
servers:
  -
    url: 'http://localhost:8080'
tags:
  -
    name: Auth
  -
    name: Books
  -
    name: Authors
paths:
  /api/login:
    post:
      tags:
        - Auth
      summary: 'Login de usuario y emision de token (30 minutos)'
      security: {  }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - username
                - password
              properties:
                username:
                  type: string
                password:
                  type: string
            example:
              username: admin
              password: Admin123!
      responses:
        200:
          description: 'Token generado'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: object
                    properties:
                      token:
                        type: string
                        example: eyJhbGciOiJIUzI1NiJ9...
                      expires_in:
                        type: integer
                        example: 1800
        401:
          description: 'Credenciales invalidas'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: UNAUTHORIZED
                      message:
                        type: string
                        example: 'Invalid or expired token.'
        422:
          description: 'Error de validacion'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: VALIDATION_ERROR
                      message:
                        type: string
                        example: 'Title cannot be blank.'
                      details:
                        type: object
                        additionalProperties:
                          type: array
                          items:
                            type: string
  /api/books:
    get:
      tags:
        - Books
      summary: 'Listar libros'
      parameters:
        -
          name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        -
          name: per_page
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        -
          name: expand
          in: query
          schema:
            type: string
            example: authors
          description: 'Expandir relaciones (valor soportado `authors`).'
      responses:
        200:
          description: 'Lista de libros'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    type: array
                    items:
                      oneOf:
                        -
                          type: object
                          properties:
                            id:
                              type: string
                              example: 65f6f18e79ad6f8a3fca53a1
                            title:
                              type: string
                              example: 'Clean Architecture'
                            authors:
                              type: array
                              items:
                                type: string
                                example: 65f6f18e79ad6f8a3fca53ff
                            publication_year:
                              type: integer
                              example: 2017
                            description:
                              type: string
                              example: 'Practicas de arquitectura para software mantenible.'
                        -
                          allOf:
                            -
                              type: object
                              properties:
                                id:
                                  type: string
                                  example: 65f6f18e79ad6f8a3fca53a1
                                title:
                                  type: string
                                  example: 'Clean Architecture'
                                authors:
                                  type: array
                                  items:
                                    type: string
                                    example: 65f6f18e79ad6f8a3fca53ff
                                publication_year:
                                  type: integer
                                  example: 2017
                                description:
                                  type: string
                                  example: 'Practicas de arquitectura para software mantenible.'
                            -
                              type: object
                              properties:
                                authors_expanded:
                                  type: array
                                  items:
                                    type: object
                                    properties:
                                      id: { type: string }
                                      full_name: { type: string }
                                      birth_date: { type: string, format: date }
                  meta:
                    type: object
                    properties:
                      pagination:
                        type: object
                        properties:
                          page:
                            type: integer
                            example: 1
                          per_page:
                            type: integer
                            example: 20
                          total:
                            type: integer
                            example: 100
        401:
          description: 'No autorizado'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: UNAUTHORIZED
                      message:
                        type: string
                        example: 'Invalid or expired token.'
    post:
      tags:
        - Books
      summary: 'Crear libro'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - title
                - authors
                - publication_year
              properties:
                title:
                  type: string
                authors:
                  type: array
                  minItems: 1
                  items:
                    type: string
                    pattern: '^[a-fA-F0-9]{24}$'
                publication_year:
                  type: integer
                description:
                  type: string
            example:
              title: 'Clean Architecture'
              authors:
                - 65f6f18e79ad6f8a3fca53ff
              publication_year: 2017
              description: 'Practicas de arquitectura para software mantenible.'
      responses:
        201:
          description: 'Libro creado'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    oneOf:
                      -
                        type: object
                        properties:
                          id:
                            type: string
                            example: 65f6f18e79ad6f8a3fca53a1
                          title:
                            type: string
                            example: 'Clean Architecture'
                          authors:
                            type: array
                            items:
                              type: string
                              example: 65f6f18e79ad6f8a3fca53ff
                          publication_year:
                            type: integer
                            example: 2017
                          description:
                            type: string
                            example: 'Practicas de arquitectura para software mantenible.'
                      -
                        allOf:
                          -
                            type: object
                            properties:
                              id:
                                type: string
                                example: 65f6f18e79ad6f8a3fca53a1
                              title:
                                type: string
                                example: 'Clean Architecture'
                              authors:
                                type: array
                                items:
                                  type: string
                                  example: 65f6f18e79ad6f8a3fca53ff
                              publication_year:
                                type: integer
                                example: 2017
                              description:
                                type: string
                                example: 'Practicas de arquitectura para software mantenible.'
                          -
                            type: object
                            properties:
                              authors_expanded:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    full_name:
                                      type: string
                                    birth_date:
                                      type: string
                                      format: date
        422:
          description: 'Error de validacion'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: VALIDATION_ERROR
                      message:
                        type: string
                        example: 'Title cannot be blank.'
                      details:
                        type: object
                        additionalProperties:
                          type: array
                          items:
                            type: string
        401:
          description: 'No autorizado'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: UNAUTHORIZED
                      message:
                        type: string
                        example: 'Invalid or expired token.'
  '/api/books/{id}':
    get:
      tags:
        - Books
      summary: 'Obtener libro por ID'
      parameters:
        -
          name: id
          in: path
          required: true
          schema:
