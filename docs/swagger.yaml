                                      title: { type: string }
                                      publication_year: { type: integer }
                                      description: { type: string }
                  meta:
                    type: object
                    properties:
                      pagination:
                        type: object
                        properties:
                          page:
                            type: integer
                            example: 1
                          per_page:
