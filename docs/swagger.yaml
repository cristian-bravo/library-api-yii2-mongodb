                          authors:
                            type: array
                            items:
                              type: string
                              example: 65f6f18e79ad6f8a3fca53ff
                          publication_year:
                            type: integer
                            example: 2017
                          description:
                            type: string
                            example: 'Practicas de arquitectura para software mantenible.'
                      -
                        allOf:
                          -
                            type: object
                            properties:
                              id:
                                type: string
                                example: 65f6f18e79ad6f8a3fca53a1
