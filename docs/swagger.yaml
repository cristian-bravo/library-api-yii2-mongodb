                            full_name:
                              type: string
                              example: 'Robert C. Martin'
                            birth_date:
                              type: string
                              format: date
                              example: '1952-12-05'
                            books:
                              type: array
                              items:
                                type: string
                                example: 65f6f18e79ad6f8a3fca53a1
                        -
