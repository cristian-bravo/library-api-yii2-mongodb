                      message:
                        type: string
                        example: 'Invalid or expired token.'
    post:
      tags:
        - Authors
      summary: 'Crear autor'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - full_name
                - birth_date
              properties:
                full_name:
                  type: string
                birth_date:
                  type: string
                  format: date
                books:
                  type: array
                  items:
                    type: string
                    pattern: '^[a-fA-F0-9]{24}$'
            example:
              full_name: 'Robert C. Martin'
              birth_date: '1952-12-05'
              books:
                - 65f6f18e79ad6f8a3fca53a1
      responses:
        201:
          description: 'Autor creado'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: success
                  data:
                    oneOf:
                      -
                        type: object
                        properties:
                          id:
                            type: string
                            example: 65f6f18e79ad6f8a3fca53ff
                          full_name:
                            type: string
                            example: 'Robert C. Martin'
                          birth_date:
                            type: string
                            format: date
                            example: '1952-12-05'
                          books:
                            type: array
                            items:
                              type: string
                              example: 65f6f18e79ad6f8a3fca53a1
                      -
                        allOf:
                          -
                            type: object
                            properties:
                              id:
                                type: string
                                example: 65f6f18e79ad6f8a3fca53ff
                              full_name:
                                type: string
                                example: 'Robert C. Martin'
                              birth_date:
                                type: string
                                format: date
                                example: '1952-12-05'
                              books:
                                type: array
                                items:
                                  type: string
                                  example: 65f6f18e79ad6f8a3fca53a1
                          -
                            type: object
                            properties:
                              books_expanded:
                                type: array
                                items:
                                  type: object
                                  properties:
                                    id:
                                      type: string
                                    title:
                                      type: string
                                    publication_year:
                                      type: integer
                                    description:
                                      type: string
        422:
          description: 'Error de validacion'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: VALIDATION_ERROR
                      message:
                        type: string
                        example: 'Title cannot be blank.'
                      details:
                        type: object
                        additionalProperties:
                          type: array
                          items:
                            type: string
        401:
          description: 'No autorizado'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: error
                  error:
                    type: object
                    properties:
                      code:
                        type: string
                        example: UNAUTHORIZED
                      message:
                        type: string
                        example: 'Invalid or expired token.'
