services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: library-api-app
    working_dir: /var/www/html
    env_file:
      - .env
    volumes:
      - ./:/var/www/html
    depends_on:
      - mongo
    command: sh -c "composer install --no-interaction --prefer-dist && php-fpm"

  nginx:
    image: nginx:1.27-alpine
    container_name: library-api-nginx
    depends_on:
      - app
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro

  mongo:
    image: mongo:7
    container_name: library-api-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: library_db
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
